<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>VoiceAI Studio Pro</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="logo">🎤 VoiceAI Pro</div>
  <div class="user">👤 Free Plan</div>
</header>

<div class="container">

  <h1>لوحة التحكم</h1>

  <div class="card">
    <h3>رفع ملف صوت</h3>
    <input type="file" id="fileInput">

    <button onclick="uploadFile()" class="btn">
      🚀 تحويل الآن
    </button>

    <p id="status"></p>

    <div class="result">
      <pre id="result"></pre>
    </div>

    <button onclick="copyText()" class="btn small">نسخ</button>
  </div>

  <div class="usage">
    الاستخدام المتبقي: <span id="limit">5</span>/5
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
